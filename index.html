<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="description" content="{{paper.metadata.description}}" />
    <meta name="keywords" content="{{paper.metadata.keywords}}" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{paper.metadata.title}}</title>

    <link
      href="https://fonts.googleapis.com/css?family=Google+Sans|Noto+Sans|Castoro"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./static/css/bulma.min.css" />
    <link rel="stylesheet" href="./static/css/bulma-carousel.min.css" />
    <link rel="stylesheet" href="./static/css/bulma-slider.min.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css"
    />
    <link rel="stylesheet" href="./static/css/index.css" />
    <link rel="icon" href="./static/images/favicon.ico" />

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.8/handlebars.min.js"></script>
    <script src="./static/js/bulma-carousel.min.js"></script>
    <script src="./static/js/bulma-slider.min.js"></script>
    <script src="./static/js/data.js"></script>
    <script src="./static/js/index.js"></script>
  </head>
  <body>
    <div id="content"></div>

    <script id="paper-template" type="text/x-handlebars-template">
      {{#if paper.navbar}}
        <nav class="navbar" role="navigation" aria-label="main navigation">
          <div class="navbar-brand">
            <a
              role="button"
              target="_blank"
              class="navbar-burger"
              aria-label="menu"
              aria-expanded="false"
            >
              <span aria-hidden="true"></span>
              <span aria-hidden="true"></span>
              <span aria-hidden="true"></span>
            </a>
          </div>
          <div class="navbar-menu">
            <div
              class="navbar-start"
              style="flex-grow: 1; justify-content: center;"
            >
              <a
                class="navbar-item"
                target="_blank"
                href="{{paper.navbar.home_link}}"
              >
                <span class="icon">
                  <i class="fas fa-home"></i>
                </span>
              </a>

              <div class="navbar-item has-dropdown is-hoverable">
                <a class="navbar-link">More Research</a>
                <div class="navbar-dropdown">
                  {{#each paper.navbar.more_research}}
                    <a class="navbar-item" target="_blank" href="{{link}}">
                      {{name}}
                    </a>
                  {{/each}}
                </div>
              </div>
            </div>
          </div>
        </nav>
      {{/if}}

      <section class="hero">
        <div class="hero-body">
          <div class="container is-max-desktop">
            <div class="columns is-centered">
              <div class="column has-text-centered">
                <h1
                  class="title is-1 publication-title"
                >{{paper.metadata.title}}</h1>
                <div class="is-size-5 publication-authors">
                  {{#each paper.authors}}
                    <span class="author-block">
                      {{#if links.website}}
                        <a href="{{links.website}}" target="_blank">{{name}}</a>
                      {{else}}
                        {{name}}
                      {{/if}}{{#if equal_contribution}}<sup
                        >†&nbsp;</sup>{{/if}}<sup
                      >{{affiliation.number}}</sup>{{#unless @last}},{{/unless}}
                    </span>
                  {{/each}}
                </div>

                <div class="is-size-6 publication-authors"><sup>†</sup>&nbsp;Equal contribution</div>

                <br />

                <div class="is-size-5 publication-authors">
                  {{#each paper.affiliations}}
                    <span class="author-block"><sup
                      >{{number}}</sup>{{name}}{{#unless @last}},
                      {{/unless}}</span>
                  {{/each}}
                </div>

                <div class="column has-text-centered">
                  <div class="publication-links">
                    {{#each paper.link_items}}
                      <span class="link-block">
                        <a
                          href="{{link}}"
                          target="_blank"
                          class="external-link button is-normal is-rounded is-dark"
                        >
                          <span class="icon">
                            <i class="{{icon}}"></i>
                          </span>
                          <span>{{name}}</span>
                        </a>
                      </span>
                    {{/each}}
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      {{#if (hasItems paper.content.intros)}}
      <section class="section">
        <div class="container is-max-desktop">
          {{#each paper.content.intros}}
            <div class="columns is-centered has-text-centered">
              <div class="column is-four-fifths">
                <h2 class="title is-3">{{title}}</h2>
                <div class="content has-text-justified">
                  {{#if (eq type "abstract")}}
                    <p>{{text}}</p>
                  {{/if}}
                  {{#if (eq type "contributions")}}
                    <ul>
                      {{#each items}}
                        <li>{{this}}</li>
                      {{/each}}
                    </ul>
                  {{/if}}
                </div>
              </div>
            </div>
          {{/each}}
        </div>
      </section>
      {{/if}}

      <!-- Sections (loop). -->
      {{#each paper.content.sections}}
        <section class="section">
          <div class="container is-max-desktop">
            <div class="columns is-centered has-text-centered">
              <div class="column is-four-fifths">
                <h2 class="title is-3">{{title}}</h2>
                {{#if image}}
                  <div class="publication-image">
                    <img src="{{image}}" alt="{{#if image_name}}{{image_name}}{{else}}{{title}}{{/if}}" />
                    {{#if image_name}}
                      <p class="publication-image-caption">{{image_name}}</p>
                    {{/if}}
                  </div>
                {{/if}}
              </div>
            </div>

            {{#if text}}
              <div class="columns is-centered has-text-centered">
                <div class="column is-four-fifths">
                  <div class="content has-text-justified">
                    <p>
                      {{text}}
                    </p>
                  </div>
                </div>
              </div>
            {{/if}}
          </div>
        </section>
      {{/each}}
      <!--/ Sections. -->

      <!-- Conclusion. -->
      {{#if (hasItems paper.content.conclusion.paragraphs)}}
        <section class="section">
          <div class="container is-max-desktop">
            <div class="columns is-centered has-text-centered">
              <div class="column is-four-fifths">
                <h2 class="title is-3">{{paper.content.conclusion.title}}</h2>
              </div>
            </div>
            <div class="columns is-centered has-text-centered">
              <div class="column is-four-fifths">
                <div class="content has-text-justified">
                  {{#each paper.content.conclusion.paragraphs}}
                    <p>{{this}}</p>
                  {{/each}}
                </div>
              </div>
            </div>
          </div>
        </section>
      {{/if}}
      <!--/ Conclusion. -->

      <!-- BibTeX. -->
      <section class="section" id="BibTeX">
        <div class="container is-max-desktop content">
          <h2 class="title">BibTeX</h2>
          <pre><code>{{paper.bibtex}}</code></pre>
        </div>
      </section>
      <!--/ BibTeX. -->

      <!-- Footer. -->
      <footer class="footer">
        <div class="container">
          <div class="content has-text-centered">
            {{#each paper.link_items}}
              <a
                class="icon-link"
                href="{{link}}"
                target="_blank"
                style="margin: 0 10px;"
              >
                <i class="{{icon}} is-small"></i>
              </a>
            {{/each}}
          </div>
          <div class="columns is-centered">
            <div class="column is-8">
              <div class="content">
                <p>
                  This page was built using the
                  <a
                    href="https://github.com/tonyh2021/papers"
                    target="_blank"
                  >Papers</a>
                  which was inspired by the
                  <a
                    href="https://nerfies.github.io/"
                    target="_blank"
                  >Nerfies</a>. You are free to borrow the of this website, we
                  just ask that you link back to this page in the footer.
                </p>
                <p>
                  This website is licensed under a
                  <a
                    rel="license"
                    href="http://creativecommons.org/licenses/by-sa/4.0/"
                    target="_blank"
                  >Creative Commons Attribution-ShareAlike 4.0 International
                    License</a>.
                </p>
              </div>
            </div>
          </div>
        </div>
      </footer>
    </script>
  </body>
</html>
